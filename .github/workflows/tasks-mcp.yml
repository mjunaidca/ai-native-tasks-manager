name: tasks-mcp

on:
  push:
    branches: [main]
    paths:
      - 'services/tasks-mcp/**'
      - '.github/workflows/tasks-mcp.yml'
    tags:
      - 'tasks-mcp-v*'
  pull_request:
    paths:
      - 'services/tasks-mcp/**'
      - '.github/workflows/tasks-mcp.yml'

concurrency:
  group: tasks-mcp-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}/tasks-mcp

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=
            type=match,pattern=tasks-mcp-v(.*),group=1

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/tasks-mcp
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=tasks-mcp
          cache-to: type=gha,scope=tasks-mcp,mode=max
