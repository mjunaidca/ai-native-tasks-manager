apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasks-mcp
  namespace: tasks-manager
  labels:
    app: tasks-mcp
    version: "c43a7f8"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tasks-mcp
  template:
    metadata:
      labels:
        app: tasks-mcp
        version: "c43a7f8"
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
        - name: tasks-mcp
          image: ghcr.io/mjunaidca/ai-native-tasks-manager/tasks-mcp:c43a7f8
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: tasks-mcp-config
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
