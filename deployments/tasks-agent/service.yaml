apiVersion: v1
kind: Service
metadata:
  name: tasks-agent
  namespace: tasks-manager
  labels:
    app: tasks-agent
spec:
  # NodePort for dev convenience — reach the agent from the host on
  # http://<node-ip>:30080. Switch back to ClusterIP (or move behind
  # an Ingress) before going live; tracked in issue #2.
  type: NodePort
  selector:
    app: tasks-agent
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: http
      nodePort: 30080
