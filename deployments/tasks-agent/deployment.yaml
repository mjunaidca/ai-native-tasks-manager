apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasks-agent
  namespace: tasks-manager
  labels:
    app: tasks-agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tasks-agent
  template:
    metadata:
      labels:
        app: tasks-agent
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
        - name: tasks-agent
          image: ghcr.io/mjunaidca/ai-native-tasks-manager/tasks-agent:latest
          imagePullPolicy: Always
          # No command override — the image's ENTRYPOINT launches
          # `uvicorn tasks_agent.api:app` on :8000 by default.
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: tasks-agent-config
            - secretRef:
                name: tasks-agent-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
